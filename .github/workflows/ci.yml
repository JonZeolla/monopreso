---
name: "CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: Ubuntu-22.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Install Task
        uses: arduino/setup-task@v2
      - name: Install prek
        run: uv tool install prek
      - name: Cache the prek cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-prek-
      - name: Run the linters
        run: task lint
  test:
    name: Test
    runs-on: Ubuntu-22.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Install Task
        uses: arduino/setup-task@v2
      - name: Init the repo
        run: task init
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          # Required because we have git submodules
          context: .
          push: false
          tags: monorepo:latest
